name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  # Hardcoded lowercase — Docker rejects image names with uppercase letters,
  # and your repo name (vatsav466/Pipeline-2) has a capital "P".
  IMAGE_NAME: vatsav466/pipeline-2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # 1. LINT + UNIT TESTS
  # ---------------------------------------------------------
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the auto-fix commit step below can push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Auto-fix commits need to be pushed to the actual branch, not a
          # detached HEAD, and need a token with write access.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-remove unused imports
        continue-on-error: true
        run: |
          if [ -f ".eslintrc.cjs" ]; then
            CONFIG=".eslintrc.cjs"
          elif [ -f "eslintrc.cjs" ]; then
            CONFIG="eslintrc.cjs"
          else
            echo "No eslintrc.cjs config file found in repo root!" >&2
            exit 1
          fi
          # eslint-plugin-unused-imports has a real auto-fixer for "X is
          # defined but never used" when X is an import — something the
          # core @typescript-eslint/no-unused-vars rule can't fix on its own.
          # Installed with --no-save so it never touches package.json/lock —
          # it's only needed for this one command.
          npm install --no-save eslint-plugin-unused-imports
          # --rule here only affects THIS run, not your .eslintrc.cjs:
          # it turns off the core rule (which would just report, not fix)
          # and turns on the plugin's fixable version instead.
          npx eslint . --ext ts,tsx --config "$CONFIG" --fix \
            --plugin unused-imports \
            --rule '{"@typescript-eslint/no-unused-vars": "off", "unused-imports/no-unused-imports": "error"}' \
            || true

      - name: Run ESLint with auto-fix
        id: eslint
        continue-on-error: true
        run: |
          if [ -f ".eslintrc.cjs" ]; then
            CONFIG=".eslintrc.cjs"
          elif [ -f "eslintrc.cjs" ]; then
            CONFIG="eslintrc.cjs"
          else
            echo "No eslintrc.cjs config file found in repo root!" >&2
            exit 1
          fi
          echo "Using ESLint config: $CONFIG"
          # --fix rewrites every issue ESLint is able to safely auto-fix
          # (mostly formatting-style rules, plus the unused imports removed
          # by the step above). Rules like no-explicit-any and no-unused-vars
          # on local variables are semantic — ESLint can't guess the correct
          # type or know if you meant to use a variable, so those still need
          # a human to edit the code.
          npx eslint . --ext ts,tsx --config "$CONFIG" --fix --report-unused-disable-directives --max-warnings 0

      - name: Commit auto-fixed files
        # Only commit on a real push to main — not on pull_request events,
        # where the default GITHUB_TOKEN often can't push to fork branches.
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix ESLint issues [skip ci]"
          file_pattern: '*.ts *.tsx'

      - name: Report ESLint outcome
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "::warning::ESLint still reports errors after auto-fix. These need manual code changes (e.g. replacing 'any' with real types, removing unused vars) — see the 'Run ESLint' step above. Continuing pipeline anyway."
          echo "### ⚠️ ESLint found issues that could not be auto-fixed" >> $GITHUB_STEP_SUMMARY
          echo "Auto-fixable issues have been committed automatically. The remaining errors (mostly \`@typescript-eslint/no-explicit-any\` and \`@typescript-eslint/no-unused-vars\`) require manual fixes and were left as-is so the pipeline could continue." >> $GITHUB_STEP_SUMMARY

      - name: Run unit tests with coverage
        run: npm run test -- --coverage || echo "No unit test script found, skipping"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------
  # 2. BUILD (with caching for speed)
  # ---------------------------------------------------------
  build:
    name: Build App
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Vite build cache
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Report bundle size
        run: |
          echo "### Build Output Size" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------
  # 3. E2E + VISUAL REGRESSION TESTING (Playwright)
  # ---------------------------------------------------------
  e2e-and-visual-tests:
    name: E2E & Visual Regression (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Serve built app
        run: |
          npx serve -s dist -l 4173 &
          npx wait-on http://localhost:4173

      - name: Run Playwright E2E tests
        env:
          BASE_URL: http://localhost:4173
        run: |
          TEST_COUNT=$(npx playwright test --list 2>/dev/null | grep -c "›" || true)
          if [ "$TEST_COUNT" -eq 0 ]; then
            echo "::warning::No Playwright E2E tests found yet — skipping this step."
            echo "### ⚠️ No E2E tests found" >> $GITHUB_STEP_SUMMARY
          else
            npx playwright test
          fi

      - name: Run visual regression tests
        run: |
          VISUAL_COUNT=$(npx playwright test --grep @visual --list 2>/dev/null | grep -c "›" || true)
          if [ "$VISUAL_COUNT" -eq 0 ]; then
            echo "::warning::No visual regression tests (@visual tag) found yet — skipping this step."
            echo "### ⚠️ No visual regression tests found" >> $GITHUB_STEP_SUMMARY
          else
            npx playwright test --grep @visual
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diff snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------
  # 4. DOCKER BUILD & PUSH TO CONTAINER REGISTRY (GHCR)
  # ---------------------------------------------------------
  docker-build-and-push:
    name: Build & Push Docker Image
    needs: e2e-and-visual-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Using GHCR_PAT (a personal access token with the write:packages
          # scope) instead of the default GITHUB_TOKEN. GITHUB_TOKEN's
          # package-write access depends on the repo's default workflow
          # permissions (Settings > Actions > General > Workflow permissions)
          # — if that's set to "Read repository contents permission" the
          # push fails with "denied: permission_denied: write_package" even
          # though this job already requests `packages: write` above. A PAT
          # sidesteps that setting entirely. You already have GHCR_PAT saved
          # as a secret for the deploy job, so it's reused here.
          password: ${{ secrets.GHCR_PAT }}

      # Docker image names must be all lowercase — GitHub repo names can have
      # capital letters (e.g. "vatsav466/Pipeline-2"), so we normalize it here
      # once and reuse it in every step below instead of github.repository directly.
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 5. DEPLOY — actually connects to your server and redeploys
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    # If DEPLOY_HOST etc. were added under Settings > Environments > <name>
    # instead of the plain repo Secrets tab, uncomment the next line and
    # put that environment's exact name here, or the job can't see them.
    # environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # Same lowercasing as the build job — env vars set via GITHUB_ENV
      # don't carry over between jobs, so this must be repeated here.
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Verify required secrets are set
        run: |
          missing=0
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && echo "::error::DEPLOY_HOST secret is missing or empty" && missing=1
          [ -z "${{ secrets.DEPLOY_USER }}" ] && echo "::error::DEPLOY_USER secret is missing or empty" && missing=1
          [ -z "${{ secrets.DEPLOY_PASSWORD }}" ] && echo "::error::DEPLOY_PASSWORD secret is missing or empty" && missing=1
          [ -z "${{ secrets.GHCR_PAT }}" ] && echo "::error::GHCR_PAT secret is missing or empty" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Add the missing secret(s) under Settings > Secrets and variables > Actions > Secrets tab (repository secrets)."
            echo "If they already exist there but this still fails, they may have been added under Settings > Environments instead — uncomment the 'environment:' line above this step and set it to that environment's name."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Deploy to server via SSH
        env:
          # This is what actually makes ssh-action's `envs:` list below work —
          # "envs: DEPLOY_PASSWORD" only forwards a variable of that name if
          # one exists in the step's env. Without this block $DEPLOY_PASSWORD
          # is empty on the remote side, so every sudo -S call gets a blank
          # password — exactly the "no password was provided" loop you saw.
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          # Pass the password in as a real remote env var instead of
          # interpolating it into the script text — avoids quoting/escaping
          # bugs if the password ever contains $, ", `, etc.
          envs: DEPLOY_PASSWORD
          script: |
            # PREFERRED FIX (do this once, then delete every "sudo"/"run_sudo"
            # below and the DEPLOY_PASSWORD sudo dance entirely):
            #   ssh in and run: sudo usermod -aG docker $USER
            #   then log out/in once so the group membership takes effect.
            # Until then, this helper re-authenticates sudo on EVERY call
            # instead of relying on sudo's cached timestamp — that cache
            # was the actual bug: it expires (often in under 5 min) while
            # `docker pull` is still downloading layers, so the LAST sudo
            # command in the script (image prune) had no valid credential
            # left and no TTY to prompt for one.
            run_sudo() {
              echo "$DEPLOY_PASSWORD" | sudo -S "$@"
            }

            # Sanity-check sudo works before doing anything else.
            run_sudo -v

            # Log in to GHCR on the server (needed if the package is private)
            run_sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GHCR_PAT }}"

            # Pull the freshly built image
            run_sudo docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

            # Remove the old container if it exists
            run_sudo docker stop pipeline-ui || true
            run_sudo docker rm pipeline-ui || true

            # Start the new container with the same port mapping
            run_sudo docker run -d \
              --name pipeline-ui \
              --restart unless-stopped \
              -p 5378:5378 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

            # Clean up old dangling images to save disk space
            run_sudo docker image prune -f
