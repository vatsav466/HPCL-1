server {
    listen 5378;
    server_name localhost;
    client_max_body_size 100M;

    # Serve the built React app directly (single-container setup)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA fallback: any unknown path falls back to index.html
        # so client-side routing (react-router) works on refresh/deep-links
        try_files $uri $uri/ /index.html;
    }

    location /digitaltwin-images/ {
        alias /opt/digitaltwin_images/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        types {
            model/gltf-binary glb;
        }
    }

    location /api/ {
        proxy_pass https://13.126.249.159/api/;
        # The backend cert is issued for a domain, not this IP -
        # skip verification or requests will fail with SSL errors.
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api123/ {
        proxy_pass https://novex.hpcl.co.in/api/;
        proxy_ssl_server_name on;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host novex.hpcl.co.in;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: serve a local fallback page if backend fails
    error_page 502 /custom_502.html;
    location = /custom_502.html {
        root /usr/share/nginx/html;
        internal;
    }
}
